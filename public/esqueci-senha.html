<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Recuperar senha</title>

    <link rel="stylesheet" href="./css/registro.css">

    <script
        type="module"
        src="./javascript/esqueci-senha.js"
    ></script>
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <h1>Recuperar senha</h1>

            <p class="subtitle">
                Informe o e-mail cadastrado para receber
                o código de recuperação.
            </p>

            <form id="password-reset-form" novalidate>
                <p
                    id="password-reset-message"
                    class="error"
                    role="alert"
                ></p>

                <div class="form-group">
                    <label for="email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="email"
                        required
                    >
                </div>

                <button
                    type="submit"
                    id="password-reset-button"
                >
                    Enviar código
                </button>
            </form>

            <p class="login-link">
                <a href="./redefinir-senha.html">
                    Já tenho um código
                </a>
            </p>

            <p class="login-link">
                <a href="./login.html">
                    Voltar para o login
                </a>
            </p>
        </div>
    </div>
</body>
</html>
