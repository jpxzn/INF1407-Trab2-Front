<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Exercício do treino | GymControl</title>

    <link rel="stylesheet" href="./css/treinos.css">

    <script
        type="module"
        src="./javascript/treino-exercicio-form.js">
    </script>
</head>

<body>
    <iframe
        src="./links.html"
        width="100%"
        height="72"
        frameborder="0"
        title="Menu de navegação"
        class="header-frame">
    </iframe>

    <main class="form-page-container">
        <a
            id="back-link"
            class="back-link"
            href="./treinos.html">
            ← Voltar para o treino
        </a>

        <section class="form-card">
            <header class="page-header">
                <h1 id="page-title" class="page-title">
                    Adicionar exercício
                </h1>

                <p id="page-subtitle" class="page-subtitle">
                    Escolha um exercício e informe as séries e repetições.
                </p>
            </header>

            <p
                id="form-error"
                class="error-message"
                role="alert">
            </p>

            <form id="treino-exercicio-form" novalidate>
                <div>
                    <label for="exercicio">
                        Exercício
                    </label>

                    <select id="exercicio" required>
                        <option value="">
                            Selecione um exercício
                        </option>
                    </select>
                </div>

                <div>
                    <label for="qtd-series">
                        Quantidade de séries
                    </label>

                    <input
                        type="number"
                        id="qtd-series"
                        min="1"
                        step="1"
                        required
                    >
                </div>

                <div>
                    <label for="qtd-repeticoes">
                        Quantidade de repetições
                    </label>

                    <input
                        type="number"
                        id="qtd-repeticoes"
                        min="1"
                        step="1"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button
                        type="submit"
                        id="save-button"
                        class="save-button">
                        Salvar
                    </button>

                    <a
                        id="cancel-link"
                        class="cancel-link"
                        href="./treinos.html">
                        Cancelar
                    </a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
