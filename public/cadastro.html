<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Criar conta</title>

    <link rel="stylesheet" href="./css/registro.css">

    <script
        type="module"
        src="./javascript/cadastro.js">
    </script>
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <h1>Criar conta</h1>

            <p class="subtitle">
                Cadastre-se para utilizar o GymControl
            </p>

            <form id="cadastro-form" novalidate>
                <p
                    id="cadastro-error"
                    class="error"
                    role="alert">
                </p>

                <div class="form-group">
                    <label for="username">
                        Nome de usuário
                    </label>

                    <input
                        type="text"
                        id="username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="email"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="password"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password-confirmation">
                        Confirme a senha
                    </label>

                    <input
                        type="password"
                        id="password-confirmation"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <button type="submit" id="cadastro-button">
                    Criar conta
                </button>
            </form>

            <p class="login-link">
                Já possui uma conta?
                <a href="./login.html">Entrar</a>
            </p>

            <p class="login-link">
                <a href="./index.html">
                    Voltar para a página inicial
                </a>
            </p>
        </div>
    </div>
</body>
</html>
