<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Detalhes do treino | GymControl</title>

    <link rel="stylesheet" href="./css/treinos.css">

    <script
        type="module"
        src="./javascript/treino.js">
    </script>
</head>

<body>
    <iframe
        src="./links.html"
        width="100%"
        height="72"
        frameborder="0"
        title="Menu de navegação"
        class="header-frame">
    </iframe>

    <main class="page-container">
        <a
            id="back-link"
            class="back-link"
            href="./treinos.html">
            ← Voltar para treinos
        </a>

        <header class="page-header">
            <h1 id="treino-name" class="page-title">
                Treino
            </h1>

            <p class="page-subtitle">
                Consulte os exercícios, séries e repetições.
            </p>
        </header>

        <div
            id="admin-top-actions"
            class="top-actions hidden">
        </div>

        <p id="loading-message" class="page-subtitle">
            Carregando treino...
        </p>

        <p
            id="page-error"
            class="error-message"
            role="alert">
        </p>

        <section
            id="exercicios-list"
            class="treinos-list">
        </section>
    </main>
</body>
</html>
