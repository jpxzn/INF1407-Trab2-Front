<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link rel="stylesheet" href="./css/registro.css">

    <script
        type="module"
        src="./javascript/login.js">
    </script>
    
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <h1>Login</h1>

            <p class="subtitle">
                Entre com seu usuário e senha para acessar o sistema
            </p>

            <form id="login-form" novalidate>
                <p
                    id="login-error"
                    class="error"
                    role="alert"
                ></p>

                <div class="form-group">
                    <label for="username">
                        Nome de usuário
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" id="login-button">
                    Entrar
                </button>
            </form>

            <p class="login-link">
                Não tem conta?
                <a href="./cadastro.html">Criar conta</a>
            </p>

            <p class="login-link">
                <a href="./index.html">Voltar para a página inicial</a>
            </p>
        </div>
    </div>
</body>
</html>
